apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: gitops-test-topic
  namespace: data-platform
  labels:
    strimzi.io/cluster: my-cluster
spec:
  partitions: 1
  replicas: 1
  config:
    # Хранить сообщения 2 часа (в миллисекундах)
    retention.ms: 7200000
    segment.bytes: 1073741824
