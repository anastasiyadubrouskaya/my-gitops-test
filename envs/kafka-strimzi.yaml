# 1. ПУЛ УЗЛОВ (Здесь мы указываем роли, диски и память)
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: my-pool
  namespace: data-platform
  labels:
    strimzi.io/cluster: my-cluster
spec:
  replicas: 1
  # Узел будет выполнять сразу обе роли (и контроллер KRaft, и брокер данных)
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 1Gi
        deleteClaim: true
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

---
# 2. САМ КЛАСТЕР (Здесь мы настраиваем порты и листенеры)
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-cluster
  namespace: data-platform
  annotations:
    # Явно включаем современные фичи оператора
    strimzi.io/node-pools: "enabled"
    strimzi.io/kraft: "enabled"
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
  
  # Оставляем оператор топиков, чтобы потом создать топик через YAML
  entityOperator:
    topicOperator: {}
    userOperator: {}
