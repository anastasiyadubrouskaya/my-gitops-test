apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: frontend # Кладем в папку frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: nginx:alpine
        resources:
          requests: { memory: "32Mi", cpu: "10m" }
