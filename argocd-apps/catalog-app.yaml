apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-service
  namespace: argocd
spec:
  project: default
  source:
    # В реальности тут будет URL твоего Git-репозитория (например, https://github.com/my-org/my-gitops-repo.git)
    repoURL: 'https://github.com/my-org/my-gitops-repo.git'
    path: catalog-service
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: app-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
