apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-load-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/anastasiyadubrouskaya/my-gitops-test.git'
    targetRevision: HEAD
    path: my-load-test # Указываем на папку с твоим Helm-чартом
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: loadtest-env
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
